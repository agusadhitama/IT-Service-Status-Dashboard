<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Service Status Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1><i class="fas fa-satellite-dish"></i> System Status Aggregator</h1>
                <p>Real time monitoring for critical IT infrastructure.</p>
            </div>
            <div class="auto-refresh">
                <i class="fas fa-sync-alt fa-spin"></i> Refreshing in <span id="countdown">60</span>s
            </div>
        </header>

        <main id="dashboard-grid" class="grid">
            </main>

        <footer>
            <p>Designed & Developed by <strong>Agus Satria Adhitama</strong> | IT Support & Web Dev</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
